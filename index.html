<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>天気予報</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ここを Bootstrap で整えてみよう -->
   <div class = "card" style = "width: 30rem;">
        <div class = "card-body">
            <div>
              <h5 class = "card-title">天気予報</h5>
              <p class = "card-text">都市を選択して、天気を取得してください。</p>
              </div>
              <div id = "city-image" class = "image"></div>
        <label class="selectbox-3">
            <select>
                //valueはjsで使用するための値
                <option value="nagoya">名古屋</option> 
                <option value="tokyo">東京</option>
                <option value="osaka">大阪</option>
            </select>
        </label>
      <button id="getBtn" class="btn btn-primary">天気を取得</button>

      <p class = "card-text mt-3">
         <div id = "result" class = "card mt-3" style = "width: 20rem;">
             <div class = "card-body">
                <p id = "temp" class = "card-text">ボタンを押してください</p>
             </div>
         </div>
      <div class="container">
          <div class="row">
              <div class="col-md-4">カード1</div>
              <div class="col-md-4">カード2</div>
              <div class="col-md-4">カード3</div>
          </div>
      </div>

           <!-- ページの一番下などに、データの出典を表示する -->
         <footer>
             <small>Weather data by <a href="https://open-meteo.com/">Open-Meteo.com</a>（CC BY 4.0）</small>
         </footer>
      </p>

    </div>
    </div>



  <!-- BootstrapのJS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- 自分のJS -->
  <script type = "module" src="js/main.js"></script>

</body>
</html>
